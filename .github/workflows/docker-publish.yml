name: Build and publish amd64 Docker image to Docker Hub

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - v*

env:
  DOCKERHUB_IMAGE: jawafdehi/jawafdehi-mcp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=git-

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trigger Dokploy redeploy
        if: github.ref == 'refs/heads/main'
        run: |
          curl -s -X POST \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://infra.jawafdehi.org/api/compose.deploy" \
            -d '{"composeId":"cnL6qss7fOjk-g2tlp4Ua","title":"Auto-deploy: ${{ github.sha }}"}'
